<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <linearGradient id="curlFace" x1="0.05" y1="0.05" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffef9"/>
      <stop offset="40%" stop-color="#f6efd8"/>
      <stop offset="72%" stop-color="#c9b27c"/>
      <stop offset="100%" stop-color="#8a7448"/>
    </linearGradient>
  </defs>

  <!-- shadow the roll casts back onto the flat page -->
  <path d="M100,18 C100,62 62,100 18,100 C50,90 90,50 100,18 Z" fill="#46392a" fill-opacity="0.4"/>

  <!-- the rolled cylinder of paper itself -->
  <path d="M100,30 C100,68 68,100 30,100 C60,91 91,60 100,30 Z" fill="url(#curlFace)" stroke="#46392a" stroke-opacity="0.55" stroke-width="2"/>

  <!-- bright highlight catching the light along the roll -->
  <path d="M97,33 C95,60 60,95 33,97" fill="none" stroke="#fffef9" stroke-opacity="0.9" stroke-width="2.4" stroke-linecap="round"/>
</svg>
