<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <linearGradient id="curlFace" x1="0.1" y1="0.1" x2="0.95" y2="0.95">
      <stop offset="0%" stop-color="#fbf8f0"/>
      <stop offset="45%" stop-color="#ece2c6"/>
      <stop offset="78%" stop-color="#cbb98e"/>
      <stop offset="100%" stop-color="#9c8c66"/>
    </linearGradient>
    <linearGradient id="curlCrease" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e6248" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6e6248" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- shadow the roll casts back onto the flat page -->
  <path d="M100,28 C100,68 68,100 28,100 C55,92 92,55 100,28 Z" fill="url(#curlCrease)"/>

  <!-- the rolled cylinder of paper itself -->
  <path d="M100,38 C100,72 72,100 38,100 C66,93 93,66 100,38 Z" fill="url(#curlFace)"/>

  <!-- crease line where the roll lifts off the page -->
  <path d="M100,38 C100,72 72,100 38,100" fill="none" stroke="#6e6248" stroke-opacity="0.4" stroke-width="1.2"/>
</svg>
