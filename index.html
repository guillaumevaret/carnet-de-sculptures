<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de sculptures — Guillaume Varet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desk" aria-hidden="true"></div>

<div class="notebook">
  <div class="page-frame">
    <div class="page-content" id="page-content">

      <div class="cover is-active" id="cover">
        <img class="cover-bg" src="images/guillaume-varet-01.jpg" alt="Profil d'une sculpture en bois sur fond sombre incandescent">
        <div class="cover-overlay"></div>
        <img class="stamp" src="images/carnet/timbre-foret-jour.gif" alt="">
        <div class="cover-text">
          <h1>Carnet de sculptures</h1>
          <p>Guillaume Varet — Chartreuse</p>
        </div>
      </div>

      <!-- pages injected by JS -->
      <div id="pages"></div>

      <button class="corner corner-prev" id="corner-prev" aria-label="Page précédente" hidden></button>
      <button class="corner corner-next" id="corner-next" aria-label="Page suivante" hidden></button>
      <div class="page-counter" id="page-counter"></div>
    </div>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab is-active" data-tab="cover">Couverture</button>
    <button class="tab" data-tab="geants">Géants</button>
    <button class="tab" data-tab="impromptu">Impromptu</button>
    <button class="tab" data-tab="visages">Visages</button>
    <button class="tab" data-tab="atelier">Atelier</button>
    <button class="tab" data-tab="contact">Contact</button>
  </nav>
</div>

<script>
const STAMP = 'images/carnet/timbre-foret-jour.gif';

let tiltSeed = 0;
function nextTilt(){
  tiltSeed++;
  const sign = tiltSeed % 2 === 0 ? 1 : -1;          // strictly alternates left/right
  const magnitude = 1.4 + Math.random() * 2.8;        // 1.4deg to 4.2deg, randomized
  return (sign * magnitude).toFixed(1);
}

const DATA = {
  geants: { bg:'bg-foret', label:'Géants', pages:[
    { img:'images/selection/sequoia.jpg', alt:"Sculpture monumentale en cours, à même un douglas, échafaudage et château en arrière-plan", cap:"Un douglas entier, sculpté debout." },
    { img:'images/selection/couple-totem.jpg', alt:"Deux silhouettes enlacées sculptées dans un tronc debout, jardin", cap:"Deux silhouettes enlacées, à même un tronc encore debout." }
  ]},
  impromptu: { bg:'bg-champ', label:'Impromptu', pages:[
    { img:'images/selection/corbeau.jpg', alt:"Oiseau facétieux au chapeau, posé sur deux jambes en bois", cap:"Un chapeau trouvé, un oiseau qui s'impose." },
    { img:'images/selection/bouddha.jpg', alt:"Buste détaillé, mains jointes, coiffe travaillée", cap:"Un visage recueilli." },
    { img:'images/selection/marmottes.jpg', alt:"Deux marmottes sculptées sur une souche, vue de dos", cap:"Deux marmottes, blotties sur une souche." },
    { img:'images/selection/saxophoniste.jpg', alt:"Personnage félin anthropomorphe tenant un instrument, fond sombre", cap:"Un musicien qu'on n'attendait pas." },
    { img:'images/selection/crapaud.jpg', alt:"Forme abstraite émergeant du bois brut, sous-bois en automne", cap:"Une forme entre figure et paysage." },
    { img:'images/selection/lunien.jpg', alt:"Masque creusé dans une bille fendue, contre un mur de pierre", cap:"Un masque trouvé dans une bille fendue." },
    { img:'images/selection/poteau.jpg', alt:"Poteau de bois fin avec ferrures, contre un muret moussu", cap:"Un dernier geste, plus retenu." }
  ]},
  visages: { bg:'bg-foret', label:'Visages', pages:[
    { img:'images/visages/epure.jpg', alt:"Visage très épuré, traits réduits à quelques lignes, dans l'herbe", cap:"À peine esquissé." },
    { img:'images/visages/pipe.jpg', alt:"Buste d'homme au chapeau et à la pipe, taille brute à la tronçonneuse", cap:"Le fumeur." },
    { img:'images/visages/beret.jpg', alt:"Tête de femme au béret, traitement lisse et minimal", cap:"Poli jusqu'au silence." },
    { img:'images/visages/ecorce-1.jpg', alt:"Visage émergeant d'une bille de bois, écorce conservée en couronne", cap:"L'écorce, gardée en couronne." },
    { img:'images/visages/bob.jpg', alt:"Tête au carré court, lumière rasante, jardin en hiver", cap:"Lumière de givre." },
    { img:'images/visages/couronne.jpg', alt:"Buste à la coiffe sculptée en éclats, posé en intérieur", cap:"La coiffe devient sculpture." },
    { img:'images/visages/totem-multiple.jpg', alt:"Plusieurs visages superposés, écorce et bois clair", cap:"Plusieurs têtes, une seule bille." },
    { img:'images/visages/brut.jpg', alt:"Visage taillé à même une branche brute", cap:"Encore aveugle, sur la branche." },
    { img:'images/visages/ecorce-2.jpg', alt:"Visage en cours de dégrossissage, écorce encore présente", cap:"En devenir." },
    { img:'images/visages/texture.jpg', alt:"Gros plan sur le grain du bois sculpté", cap:"Le grain, de très près." }
  ]}
};

function photoPageHTML(bgClass, label, it){
  const tilt = nextTilt();
  return `
    <div class="page ${bgClass}">
      <span class="section-label">${label}</span>
      <div class="polaroid" style="transform: rotate(${tilt}deg);">
        <img src="${it.img}" alt="${it.alt}" loading="lazy">
        <div class="polaroid-band"><p>${it.cap}</p></div>
      </div>
    </div>`;
}

const pagesEl = document.getElementById('pages');
let html = '';

Object.entries(DATA).forEach(([key, section]) => {
  section.pages.forEach(it => { html += `<div data-section="${key}">${photoPageHTML(section.bg, section.label, it)}</div>`; });
});

html += `
  <div data-section="atelier"><div class="page bg-foret">
    <span class="section-label">Atelier</span>
    <div class="page-text">
      <h2>L'atelier</h2>
      <p>Tout commence dehors, sur un établi de chantier. La tronçonneuse d'abord, pour dégrossir — puis la meuleuse, pour faire apparaître ce qui était déjà là.</p>
    </div>
    <div class="polaroid" style="margin-top:1rem; transform: rotate(-1.5deg);">
      <img src="images/atelier/etabli.jpg" alt="Guillaume Varet au travail, meuleuse à la main">
      <div class="polaroid-band"><p>en Chartreuse</p></div>
    </div>
  </div></div>
`;

html += `
  <div data-section="contact"><div class="page bg-champ">
    <span class="section-label">Contact</span>
    <div class="page-text"><h2>Contact</h2></div>
    <img class="contact-img" src="images/carnet/contact.png" alt="Coordonnées de l'atelier">
  </div></div>
`;

pagesEl.innerHTML = html;

/* unwrap: each page lives inside a [data-section] wrapper for easy querying */
const sections = {};
['geants','impromptu','visages','atelier','contact'].forEach(key => {
  sections[key] = Array.from(document.querySelectorAll(`#pages [data-section="${key}"] .page`));
});

const cover = document.getElementById('cover');
const tabs = document.querySelectorAll('.tab');
const cornerPrev = document.getElementById('corner-prev');
const cornerNext = document.getElementById('corner-next');
const counter = document.getElementById('page-counter');

let currentTab = 'cover';
let pageIndex = 0;

function allPagesFlat(){ return Object.values(sections).flat(); }

function render(direction){
  allPagesFlat().forEach(p => { p.classList.remove('is-active','flip-next','flip-prev'); });
  cover.classList.remove('is-active');

  if(currentTab === 'cover'){
    cover.classList.add('is-active');
    cornerPrev.hidden = true; cornerNext.hidden = true; counter.textContent = '';
    return;
  }

  const pages = sections[currentTab];
  const p = pages[pageIndex];
  p.classList.add('is-active');
  if(direction === 1) p.classList.add('flip-next');
  if(direction === -1) p.classList.add('flip-prev');

  cornerPrev.hidden = pageIndex === 0;
  cornerNext.hidden = pageIndex >= pages.length - 1;
  counter.textContent = pages.length > 1 ? `page ${pageIndex+1} / ${pages.length}` : '';
}

tabs.forEach(t => t.addEventListener('click', () => {
  currentTab = t.dataset.tab;
  pageIndex = 0;
  tabs.forEach(tt => tt.classList.toggle('is-active', tt === t));
  render(0);
}));

cornerNext.addEventListener('click', () => {
  const pages = sections[currentTab];
  if(pageIndex < pages.length - 1){ pageIndex++; render(1); }
});
cornerPrev.addEventListener('click', () => {
  if(pageIndex > 0){ pageIndex--; render(-1); }
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight') cornerNext.click();
  if(e.key === 'ArrowLeft') cornerPrev.click();
});

render(0);
</script>

</body>
</html>
