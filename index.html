<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation répartition – V1.41</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1c1410;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .mockup {
            background: #f3ecd9;
            width: min(92vw, 760px);
            height: min(86vh, 640px);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        /* Fond quadrillé pour voir les bords */
        .page {
            position: absolute;
            inset: 0;
            background: #f3ecd9;
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* ── Reliure avec offset FIXE de 8px ── */
        .binding {
            position: absolute;
            left: 10px;
            top: 8px;      /* fixe */
            bottom: 8px;   /* fixe */
            width: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .hole-ring {
            position: relative;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .hole {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border-radius: 50%;
            background: rgba(60, 50, 38, 0.5);
            z-index: 2;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .ring-front {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 40px;
            height: 16px;
            margin: -8px 0 0 -40px;
            border-radius: 50%;
            border: 3.5px solid #7a7466;
            border-top-color: #d8d4c4;
            border-left-color: #c2bca8;
            box-sizing: border-box;
            z-index: 1;
            /* clip‑path vertical par défaut (mobile) */
            clip-path: polygon(50% 50%, 45% 100%, 100% 100%, 100% 0%, 0% 0%, 0% 50%, 50% 50%);
        }

        /* ── version desktop : anneau horizontal ── */
        @media (min-width: 721px) {
            .binding {
                left: 10px;
                top: 8px;
                bottom: 8px;
                flex-direction: column;
                width: 20px;
                height: auto;
            }
            .ring-front {
                width: 40px;
                height: 16px;
                margin: -8px 0 0 -40px;
                clip-path: polygon(50% 50%, 100% 55%, 100% 0%, 0% 0%, 0% 100%, 50% 100%, 50% 50%);
            }
        }

        /* ── version mobile : anneau vertical (reliure en haut) ── */
        @media (max-width: 720px) {
            .binding {
                left: 6%;
                right: 6%;
                top: 8px;      /* fixe */
                bottom: 8px;   /* fixe ! */
                width: auto;
                height: 32px;  /* 16px (anneau) + 8px + 8px */
                flex-direction: row;
                justify-content: space-between;
                align-items: center;  /* centrer verticalement */
            }
            .hole-ring {
                width: 16px;
                height: 16px;
            }
            .ring-front {
                width: 16px;
                height: 40px;
                margin: -40px 0 0 -8px;
                clip-path: polygon(50% 50%, 45% 100%, 100% 100%, 100% 0%, 0% 0%, 0% 50%, 50% 50%);
            }
        }

        /* Étiquette pour savoir quelle orientation est active */
        .badge {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="mockup">
    <div class="page"></div>
    <div class="binding" id="binding"></div>
    <div class="badge" id="badge">🔄 Redimensionnez pour basculer</div>
</div>

<script>
    const binding = document.getElementById('binding');
    const badge = document.getElementById('badge');
    const RING_SHORT_AXIS = 16;

    function buildBinding() {
        binding.innerHTML = '';
        const vertical = window.innerWidth <= 720;
        // Espace disponible = hauteur (desktop) ou largeur (mobile) du conteneur
        const space = vertical ? binding.clientWidth : binding.clientHeight;
        // Calcul du nombre d'anneaux
        let count = Math.max(3, Math.floor(space / RING_SHORT_AXIS));
        if (!vertical) count = Math.max(3, count - 1); // léger ajustement pour desktop

        for (let i = 0; i < count; i++) {
            const item = document.createElement('div');
            item.className = 'hole-ring';

            const hole = document.createElement('div');
            hole.className = 'hole';

            const front = document.createElement('div');
            front.className = 'ring-front';

            item.appendChild(hole);
            item.appendChild(front);
            binding.appendChild(item);
        }

        // Mettre à jour le badge
        badge.innerHTML = vertical ?
            '⬆️ VERTICAL · reliure en haut · offset 8px' :
            '⬅️ HORIZONTAL · reliure à gauche · offset 8px';
    }

    buildBinding();

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            buildBinding();
        }, 150);
    });
</script>

</body>
</html>
