<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation finale – H / V</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1c1410;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .mockup {
            background: #f3ecd9;
            width: min(92vw, 760px);
            height: min(86vh, 640px);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Fond quadrillé pour visualiser les bords */
        .page {
            position: absolute;
            inset: 0;
            background: #f3ecd9;
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* ── Reliure ── */
        .binding {
            position: absolute;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .hole-ring {
            position: relative;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .hole {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border-radius: 50%;
            background: rgba(60, 50, 38, 0.5);
            z-index: 2;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .ring-front {
            position: absolute;
            left: 50%;
            top: 50%;
            border-radius: 50%;
            border: 3.5px solid #7a7466;
            border-top-color: #d8d4c4;
            border-left-color: #c2bca8;
            box-sizing: border-box;
            z-index: 1;
        }

        /* ── HORIZONTAL (desktop) ── */
        @media (min-width: 721px) {
            .binding {
                left: 10px;      /* position de la reliure */
                top: 8px;        /* offset haut */
                bottom: 8px;     /* offset bas */
                width: 20px;
                height: auto;
                flex-direction: column;
                justify-content: space-between;
            }
            .ring-front {
                width: 40px;
                height: 16px;
                margin: -8px 0 0 -40px;
                clip-path: polygon(50% 50%, 100% 55%, 100% 0%, 0% 0%, 0% 100%, 50% 100%, 50% 50%);
            }
        }

        /* ── VERTICAL (mobile) ── */
        @media (max-width: 720px) {
            .binding {
                top: 10px;       /* position de la reliure */
                left: 8px;       /* offset gauche */
                right: 8px;      /* offset droite */
                bottom: auto;
                width: auto;
                height: 20px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .ring-front {
                width: 16px;
                height: 40px;
                margin: -40px 0 0 -8px;
                clip-path: polygon(50% 50%, 45% 100%, 100% 100%, 100% 0%, 0% 0%, 0% 50%, 50% 50%);
            }
        }

        /* Étiquette d’information */
        .badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10;
            backdrop-filter: blur(4px);
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge small {
            font-weight: 400;
            opacity: 0.7;
            display: block;
            font-size: 0.65rem;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="mockup">
    <div class="page"></div>
    <div class="binding" id="binding"></div>
    <div class="badge" id="badge">🔄 Redimensionnez pour basculer</div>
</div>

<script>
    const binding = document.getElementById('binding');
    const badge = document.getElementById('badge');
    const RING_SHORT_AXIS = 16;

    function buildBinding() {
        binding.innerHTML = '';
        const vertical = window.innerWidth <= 720;
        // Espace disponible = hauteur (desktop) ou largeur (mobile) du conteneur
        const space = vertical ? binding.clientWidth : binding.clientHeight;
        let count = Math.max(3, Math.floor(space / RING_SHORT_AXIS));
        if (!vertical) count = Math.max(3, count - 1);

        for (let i = 0; i < count; i++) {
            const item = document.createElement('div');
            item.className = 'hole-ring';

            const hole = document.createElement('div');
            hole.className = 'hole';

            const front = document.createElement('div');
            front.className = 'ring-front';

            item.appendChild(hole);
            item.appendChild(front);
            binding.appendChild(item);
        }

        // Mettre à jour l’étiquette avec les valeurs exactes
        if (vertical) {
            badge.innerHTML = '⬆️ VERTICAL · top:10px · left/right:8px';
        } else {
            badge.innerHTML = '⬅️ HORIZONTAL · left:10px · top/bottom:8px';
        }
    }

    buildBinding();

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            buildBinding();
        }, 150);
    });
</script>

</body>
</html>
