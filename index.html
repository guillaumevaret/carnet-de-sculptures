<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anneaux H / V avec trou et bord de page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1c1410;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            gap: 50px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .mockup {
            background: #f3ecd9;
            border-radius: 8px;
            padding: 30px 35px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #b8aa94;
        }
        .mockup-title {
            color: #4f4a40;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.05);
            padding: 4px 16px;
            border-radius: 20px;
        }
        .binding-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Simule le bord de la page */
        .page-edge {
            background: #e8dccc;
            border-radius: 2px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }
        .page-edge-h {
            width: 100px;
            height: 50px;
            border-right: 3px solid #c0b09a;
        }
        .page-edge-v {
            width: 50px;
            height: 100px;
            border-bottom: 3px solid #c0b09a;
        }

        /* Conteneur de l’anneau */
        .ring-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ring-wrapper-h {
            top: 50%;
            right: -20px;    /* déborde du bord droit */
            transform: translateY(-50%);
            width: 40px;
            height: 16px;
        }
        .ring-wrapper-v {
            left: 50%;
            bottom: -20px;   /* déborde du bord inférieur */
            transform: translateX(-50%);
            width: 16px;
            height: 40px;
        }

        /* L’anneau (ellipse) */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 3.5px solid #7a7466;
            border-top-color: #d8d4c4;
            border-left-color: #c2bca8;
            box-sizing: border-box;
            background: transparent;
        }
        .ring-h {
            width: 40px;
            height: 16px;
            clip-path: polygon(50% 50%, 100% 55%, 100% 0%, 0% 0%, 0% 100%, 50% 100%, 50% 50%);
        }
        .ring-v {
            width: 16px;
            height: 40px;
            clip-path: polygon(50% 50%, 45% 100%, 100% 100%, 100% 0%, 0% 0%, 0% 50%, 50% 50%);
        }

        /* Le trou (perforation) */
        .hole {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(60, 50, 38, 0.5);
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .info {
            margin-top: 16px;
            color: #4f4a40;
            font-size: 0.7rem;
            text-align: center;
            background: rgba(0,0,0,0.04);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            word-break: break-all;
            max-width: 300px;
            line-height: 1.4;
        }
        .badge {
            font-size: 0.75rem;
            font-weight: 700;
            background: #2a221e;
            color: #d4c9b0;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- HORIZONTAL : reliure à gauche -->
    <div class="mockup">
        <div class="badge">⬅️ HORIZONTAL · reliure à gauche</div>
        <div class="binding-area">
            <div class="page-edge page-edge-h"></div>
            <div class="ring-wrapper ring-wrapper-h">
                <div class="ring ring-h"></div>
                <div class="hole"></div>
            </div>
        </div>
        <div class="info">
            clip-path: polygon(50% 50%,<br>100% 55%, 100% 0%,<br>0% 0%, 0% 100%,<br>50% 100%, 50% 50%)
        </div>
    </div>

    <!-- VERTICAL : reliure en haut (rotation horaire) -->
    <div class="mockup">
        <div class="badge">⬆️ VERTICAL · reliure en haut (horaire)</div>
        <div class="binding-area">
            <div class="page-edge page-edge-v"></div>
            <div class="ring-wrapper ring-wrapper-v">
                <div class="ring ring-v"></div>
                <div class="hole"></div>
            </div>
        </div>
        <div class="info">
            clip-path: polygon(50% 50%,<br>45% 100%, 100% 100%,<br>100% 0%, 0% 0%,<br>0% 50%, 50% 50%)
        </div>
    </div>

</body>
</html>
