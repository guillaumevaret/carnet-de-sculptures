<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guillaume Varet — Sculptures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-black: #0b0a08;
    --ember: #c9883f;
    --ember-bright: #e0a85c;
    --cream: #f1ead9;
    --cream-dim: rgba(241,234,217,0.72);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{ height:100%; background:var(--ink-black); }

  body{
    font-family:'Inter', sans-serif;
    overflow:hidden;
  }

  .hero{
    position:relative;
    height:100vh;
    width:100vw;
    display:flex;
    align-items:flex-end;
  }

  .hero-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:55% 30%;
  }

  .overlay{
    position:absolute;
    inset:0;
    background:
      linear-gradient(to top, rgba(11,10,8,0.96) 0%, rgba(11,10,8,0.55) 28%, rgba(11,10,8,0.05) 55%, rgba(11,10,8,0.25) 100%);
  }

  .hero-content{
    position:relative;
    z-index:2;
    padding: 0 6vw 8vh;
    max-width: 900px;
    opacity:0;
    transform: translateY(14px);
    animation: rise 1.1s ease-out 0.2s forwards;
  }

  .eyebrow{
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size: clamp(0.7rem, 1.1vw, 0.85rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ember-bright);
    margin-bottom: 0.9rem;
  }

  .name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2.6rem, 8.5vw, 6.2rem);
    line-height: 0.98;
    color: var(--cream);
    letter-spacing: -0.01em;
  }

  .medium{
    margin-top: 1.1rem;
    font-family:'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(1rem, 1.6vw, 1.25rem);
    color: var(--cream-dim);
    letter-spacing: 0.01em;
  }

  .medium::before{
    content:"";
    display:inline-block;
    width: 28px;
    height: 1px;
    background: var(--ember);
    margin-right: 0.8em;
    vertical-align: middle;
  }

  @keyframes rise{
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .hero-content{ animation:none; opacity:1; transform:none; }
  }

  @media (max-width: 600px){
    .hero-content{ padding: 0 7vw 9vh; }
  }
</style>
</head>
<body>

<main class="hero">
  <img class="hero-img" src="images/guillaume-varet-01.jpg" alt="Profil d'une sculpture en bois, vue de dos, sur fond sombre incandescent">
  <div class="overlay"></div>
  <div class="hero-content">
    <p class="eyebrow">Chartreuse</p>
    <h1 class="name">Guillaume Varet</h1>
    <p class="medium">Sculptures — bois, paille&hellip;</p>
  </div>
</main>

</body>
</html>
