<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anneaux elliptiques validés</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1c1410;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            gap: 60px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .card {
            background: #2a221e;
            border-radius: 20px;
            padding: 30px 35px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #4d3f35;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .ring-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        .ring {
            border-radius: 50%;
            border: 5px solid #b8aa94;
            border-top-color: #e8ddd0;
            border-left-color: #d0c2ae;
            box-sizing: border-box;
            background: transparent;
        }
        .ring-h {
            width: 80px;
            height: 32px;   /* ellipse horizontale */
        }
        .ring-v {
            width: 32px;
            height: 80px;   /* ellipse verticale */
        }
        .label {
            color: #d4c9b0;
            font-size: 1.1rem;
            font-weight: 600;
            background: #1f1814;
            padding: 4px 18px;
            border-radius: 30px;
            border: 1px solid #4d3f35;
            margin-top: 6px;
        }
        .code {
            color: #a89880;
            font-size: 0.65rem;
            text-align: center;
            margin-top: 10px;
            background: #1f1814;
            padding: 8px 10px;
            border-radius: 8px;
            font-family: monospace;
            line-height: 1.4;
            max-width: 280px;
        }
        .badge {
            font-size: 0.7rem;
            background: #4d3f35;
            color: #d4c9b0;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge.h { background: #5d4a3a; }
        .badge.v { background: #3a4d5d; }
    </style>
</head>
<body>

    <!-- HORIZONTAL : haut 55%, bas 50% -->
    <div class="card">
        <div class="badge h">⬅️ Horizontal · reliure à gauche</div>
        <div class="ring-wrapper">
            <div class="ring ring-h" style="clip-path: polygon(50% 50%, 100% 55%, 100% 0%, 0% 0%, 0% 100%, 50% 100%, 50% 50%);"></div>
        </div>
        <div class="label">H · 55% / 50%</div>
        <div class="code">polygon(50% 50%,<br>100% 55%, 100% 0%,<br>0% 0%, 0% 100%,<br>50% 100%, 50% 50%)</div>
    </div>

    <!-- VERTICAL : rotation horaire de 90° -->
    <div class="card">
        <div class="badge v">⬆️ Vertical · reliure en haut</div>
        <div class="ring-wrapper">
            <div class="ring ring-v" style="clip-path: polygon(50% 50%, 55% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 50%, 50% 50%);"></div>
        </div>
        <div class="label">V · rotation horaire</div>
        <div class="code">polygon(50% 50%,<br>55% 0%, 0% 0%,<br>0% 100%, 100% 100%,<br>100% 50%, 50% 50%)</div>
    </div>

</body>
</html>
