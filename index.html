<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de sculptures — Guillaume Varet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desk" aria-hidden="true"></div>

<div class="notebook">
  <div class="page-frame" id="page-frame">
    <div class="page-content" id="page-content">

      <div class="cover is-active" id="cover">
        <img class="cover-bg" src="images/guillaume-varet-01.jpg" alt="Profil d'une sculpture en bois sur fond sombre incandescent">
        <div class="cover-overlay"></div>
        <img class="stamp" src="images/carnet/timbre-foret-jour.gif" alt="">
        <div class="cover-text">
          <h1>Carnet de sculptures</h1>
          <p>Guillaume Varet</p>
          <p class="cover-version">V1.24</p>
        </div>
      </div>

      <!-- pages injected by JS -->
      <div id="pages"></div>

      <button class="corner corner-tl" data-dir="prev" aria-label="Page précédente" hidden></button>
      <button class="corner corner-tr" data-dir="next" aria-label="Page suivante" hidden></button>
      <button class="corner corner-bl" data-dir="prev" aria-label="Page précédente" hidden><span class="corner-arrow"><svg viewBox="0 0 40 40" width="26" height="26"><circle cx="20" cy="20" r="13" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" pathLength="100" stroke-dasharray="72 28" transform="rotate(-90 20 20)"/><path d="M3,19 L11,15 L9,25 Z" fill="currentColor"/></svg></span></button>
      <button class="corner corner-br" data-dir="next" aria-label="Page suivante" hidden><span class="corner-arrow"><svg viewBox="0 0 40 40" width="26" height="26"><circle cx="20" cy="20" r="13" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" pathLength="100" stroke-dasharray="72 28" transform="rotate(-90 20 20)"/><path d="M3,19 L11,15 L9,25 Z" fill="currentColor"/></svg></span></button>
      <div class="page-counter" id="page-counter"></div>
    </div>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab is-active" data-tab="cover">Couverture</button>
    <button class="tab" data-tab="geants">Géants</button>
    <button class="tab" data-tab="impromptu">Impromptu</button>
    <button class="tab" data-tab="visages">Visages</button>
    <button class="tab" data-tab="atelier">Atelier</button>
    <button class="tab" data-tab="contact">Contact</button>
  </nav>
  <div class="page-edges" id="page-edges"></div>
</div>

<script>
const pageFrame = document.getElementById('page-frame');
const binding = document.createElement('div');
binding.className = 'binding';
pageFrame.appendChild(binding);

const RING_SHORT_AXIS = 14; // the dimension along which rings are stacked — "touching" means count = space / this

function buildBinding(){
  binding.innerHTML = '';
  const vertical = window.innerWidth > 720; // matches the CSS breakpoint: column on desktop, row on mobile
  const space = (vertical ? binding.clientHeight : binding.clientWidth) * 0.94; // small safety margin so it never overflows
  let count = Math.max(3, Math.floor(space / RING_SHORT_AXIS));
  if(!vertical) count = Math.max(3, count - 2); // top layout needs extra clearance before the tabs

  for(let i = 0; i < count; i++){
    const item = document.createElement('div');
    item.className = 'hole-ring';

    const hole = document.createElement('div');
    hole.className = 'hole';

    const front = document.createElement('div');
    front.className = 'ring-front';

    item.appendChild(hole);
    item.appendChild(front);
    binding.appendChild(item);
  }
}

buildBinding();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { buildBinding(); render(0); }, 150);
});

const STAMP = 'images/carnet/timbre-foret-jour.gif';

let tiltSeed = 0;
function nextTilt(){
  tiltSeed++;
  const sign = tiltSeed % 2 === 0 ? 1 : -1;          // strictly alternates left/right
  const magnitude = 1.4 + Math.random() * 2.8;        // 1.4deg to 4.2deg, randomized
  return (sign * magnitude).toFixed(1);
}

function tapeHTML(){
  const fourCorners = Math.random() < 0.5;
  if(fourCorners){
    return ['tl','tr','bl','br'].map(c => `<span class="tape ${c}"></span>`).join('');
  }
  const diag = Math.random() < 0.5 ? ['tl','br'] : ['tr','bl'];
  return diag.map(c => `<span class="tape ${c}"></span>`).join('');
}

const DATA = {
  geants: { bg:'bg-foret', label:'Géants', pages:[
    { img:'images/selection/sequoia.jpg', alt:"Sculpture monumentale en cours, à même un douglas, échafaudage et château en arrière-plan", cap:"Un douglas entier, sculpté debout." },
    { img:'images/selection/couple-totem.jpg', alt:"Deux silhouettes enlacées sculptées dans un tronc debout, jardin", cap:"Deux silhouettes enlacées, à même un tronc encore debout." }
  ]},
  impromptu: { bg:'bg-champ', label:'Impromptu', pages:[
    { img:'images/selection/corbeau.jpg', alt:"Oiseau facétieux au chapeau, posé sur deux jambes en bois", cap:"Un chapeau trouvé, un oiseau qui s'impose." },
    { img:'images/selection/bouddha.jpg', alt:"Buste détaillé, mains jointes, coiffe travaillée", cap:"Un visage recueilli." },
    { img:'images/selection/marmottes.jpg', alt:"Deux marmottes sculptées sur une souche, vue de dos", cap:"Deux marmottes, blotties sur une souche." },
    { img:'images/selection/saxophoniste.jpg', alt:"Personnage félin anthropomorphe tenant un instrument, fond sombre", cap:"Un musicien qu'on n'attendait pas." },
    { img:'images/selection/crapaud.jpg', alt:"Forme abstraite émergeant du bois brut, sous-bois en automne", cap:"Une forme entre figure et paysage." },
    { img:'images/selection/lunien.jpg', alt:"Masque creusé dans une bille fendue, contre un mur de pierre", cap:"Un masque trouvé dans une bille fendue." },
    { img:'images/selection/poteau.jpg', alt:"Poteau de bois fin avec ferrures, contre un muret moussu", cap:"Un dernier geste, plus retenu." }
  ]},
  visages: { bg:'bg-foret', label:'Visages', pages:[
    { img:'images/visages/epure.jpg', alt:"Visage très épuré, traits réduits à quelques lignes, dans l'herbe", cap:"À peine esquissé." },
    { img:'images/visages/pipe.jpg', alt:"Buste d'homme au chapeau et à la pipe, taille brute à la tronçonneuse", cap:"Le fumeur." },
    { img:'images/visages/beret.jpg', alt:"Tête de femme au béret, traitement lisse et minimal", cap:"Poli jusqu'au silence." },
    { img:'images/visages/ecorce-1.jpg', alt:"Visage émergeant d'une bille de bois, écorce conservée en couronne", cap:"L'écorce, gardée en couronne." },
    { img:'images/visages/bob.jpg', alt:"Tête au carré court, lumière rasante, jardin en hiver", cap:"Lumière de givre." },
    { img:'images/visages/couronne.jpg', alt:"Buste à la coiffe sculptée en éclats, posé en intérieur", cap:"La coiffe devient sculpture." },
    { img:'images/visages/totem-multiple.jpg', alt:"Plusieurs visages superposés, écorce et bois clair", cap:"Plusieurs têtes, une seule bille." },
    { img:'images/visages/brut.jpg', alt:"Visage taillé à même une branche brute", cap:"Encore aveugle, sur la branche." },
    { img:'images/visages/ecorce-2.jpg', alt:"Visage en cours de dégrossissage, écorce encore présente", cap:"En devenir." },
    { img:'images/visages/texture.jpg', alt:"Gros plan sur le grain du bois sculpté", cap:"Le grain, de très près." }
  ]}
};

function photoPageHTML(bgClass, label, it){
  const tilt = nextTilt();
  return `
    <div class="page ${bgClass}">
      <span class="section-label">${label}</span>
      <div class="polaroid" style="transform: rotate(${tilt}deg);">
        ${tapeHTML()}
        <img src="${it.img}" alt="${it.alt}" loading="lazy">
        <div class="polaroid-band"><p>${it.cap}</p></div>
      </div>
    </div>`;
}

const pagesEl = document.getElementById('pages');
let html = '';

Object.entries(DATA).forEach(([key, section]) => {
  section.pages.forEach(it => { html += `<div data-section="${key}">${photoPageHTML(section.bg, section.label, it)}</div>`; });
});

html += `
  <div data-section="atelier"><div class="page page-photo-text">
    <span class="section-label">Atelier</span>
    <img class="photo-bg" src="images/atelier/etabli.jpg" alt="Guillaume Varet au travail, meuleuse à la main, sur un établi de chantier">
    <div class="photo-overlay"></div>
    <p class="photo-overlay-text">Tout commence dehors, sur un établi de chantier. La tronçonneuse d'abord, pour dégrossir — puis la meuleuse, pour faire apparaître ce qui était déjà là.</p>
  </div></div>
`;

html += `
  <div data-section="contact"><div class="page bg-champ">
    <span class="section-label">Contact</span>
    <img class="contact-img" src="images/carnet/contact.png" alt="Coordonnées de l'atelier">
  </div></div>
`;

pagesEl.innerHTML = html;

/* unwrap: each page lives inside a [data-section] wrapper for easy querying */
const sections = {};
const SECTION_ORDER = ['geants','impromptu','visages','atelier','contact'];
SECTION_ORDER.forEach(key => {
  sections[key] = Array.from(document.querySelectorAll(`#pages [data-section="${key}"] .page`));
});

const cover = document.getElementById('cover');
const tabs = document.querySelectorAll('.tab');
const tabsNav = document.getElementById('tabs');
const pageEdges = document.getElementById('page-edges');
const corners = Array.from(document.querySelectorAll('.corner'));
const cornersPrev = corners.filter(c => c.dataset.dir === 'prev');
const cornersNext = corners.filter(c => c.dataset.dir === 'next');
const counter = document.getElementById('page-counter');
const pageContent = document.getElementById('page-content');

/* one flat sequence for the whole book: the cover, then every page of every section in order */
const sequence = [{ tab:'cover', el:cover }];
SECTION_ORDER.forEach(key => {
  sections[key].forEach(el => sequence.push({ tab:key, el }));
});

let pos = 0; // index into `sequence`

function goNext(){ if(pos < sequence.length - 1){ pos++; render(1); } }
function goPrev(){ if(pos > 0){ pos--; render(-1); } }

const EDGE_GAP = 3; // px between each thin page-edge line

function updatePageEdges(currentTab, linesAbove, linesBelow){
  pageEdges.innerHTML = '';
  if(!currentTab){ return; }
  const activeTabEl = [...tabs].find(t => t.dataset.tab === currentTab);
  if(!activeTabEl) return;

  const navRect = tabsNav.getBoundingClientRect();
  const tabRect = activeTabEl.getBoundingClientRect();
  const topY = tabRect.top - navRect.top;
  const bottomY = tabRect.bottom - navRect.top;

  for(let i = 1; i <= linesAbove; i++){
    const line = document.createElement('div');
    line.className = 'edge-line';
    line.style.top = (topY - i * EDGE_GAP) + 'px';
    pageEdges.appendChild(line);
  }
  for(let i = 1; i <= linesBelow; i++){
    const line = document.createElement('div');
    line.className = 'edge-line';
    line.style.top = (bottomY + i * EDGE_GAP) + 'px';
    pageEdges.appendChild(line);
  }
}

function render(direction){
  sequence.forEach(s => s.el.classList.remove('is-active','flip-next','flip-prev'));

  const current = sequence[pos];
  current.el.classList.add('is-active');
  if(direction === 1) current.el.classList.add('flip-next');
  if(direction === -1) current.el.classList.add('flip-prev');

  tabs.forEach(tt => tt.classList.toggle('is-active', tt.dataset.tab === current.tab));

  const atCover = current.tab === 'cover';
  const atEnd = pos >= sequence.length - 1;

  cornersPrev.forEach(c => { c.hidden = atCover; });
  cornersNext.forEach(c => { c.hidden = atEnd; });

  if(atCover){ counter.textContent = ''; updatePageEdges(null, 0, 0); return; }

  const idx = sections[current.tab].indexOf(current.el); // 0-based
  const total = sections[current.tab].length;
  counter.textContent = `${current.tab} — page ${idx + 1} / ${total}`;
  updatePageEdges(current.tab, idx, total - 1 - idx);
}

tabs.forEach(t => t.addEventListener('click', () => {
  const target = t.dataset.tab;
  pos = sequence.findIndex(s => s.tab === target);
  render(0);
}));

corners.forEach(c => c.addEventListener('click', () => {
  c.dataset.dir === 'next' ? goNext() : goPrev();
}));

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight') goNext();
  if(e.key === 'ArrowLeft') goPrev();
});

/* the corner "grows" and shifts colour toward the cursor as it approaches the actual page corner */
const ANCHORS = {
  'corner-tl': ['left','top'],
  'corner-tr': ['right','top'],
  'corner-bl': ['left','bottom'],
  'corner-br': ['right','bottom']
};
const BASE_SIZE = 52, MAX_SIZE = 118, INFLUENCE = 150;
const maxT = new Map(); // remembers how close the cursor has gotten, per corner — never decreases while hovering

pageContent.addEventListener('mousemove', (e) => {
  const frameRect = pageContent.getBoundingClientRect();
  corners.forEach(c => {
    if(c.hidden) return;
    const cls = [...c.classList].find(cl => ANCHORS[cl]);
    const [hx, vy] = ANCHORS[cls];
    const ax = hx === 'left' ? frameRect.left : frameRect.right;
    const ay = vy === 'top' ? frameRect.top : frameRect.bottom;
    const dist = Math.hypot(e.clientX - ax, e.clientY - ay);
    const tNow = Math.max(0, 1 - dist / INFLUENCE);
    const tBest = Math.max(maxT.get(c) || 0, tNow); // once reached, stays — doesn't shrink as the cursor moves past
    maxT.set(c, tBest);
    const size = BASE_SIZE + tBest * (MAX_SIZE - BASE_SIZE);
    c.style.width = size + 'px';
    c.style.height = size + 'px';
    c.style.setProperty('--fold-alpha', (tBest * 0.5).toFixed(2));
    c.style.setProperty('--fold-color', tBest > 0.45 ? '192,67,47' : '70,60,46');
  });
});

pageContent.addEventListener('mouseleave', () => {
  corners.forEach(c => {
    maxT.set(c, 0);
    c.style.width = BASE_SIZE + 'px';
    c.style.height = BASE_SIZE + 'px';
    c.style.setProperty('--fold-alpha', '0');
    c.style.setProperty('--fold-color', '70,60,46');
  });
});

render(0);
</script>

</body>
</html>
