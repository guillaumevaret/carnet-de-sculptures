<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test onglets + reliure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1c1410;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .mockup {
            background: #f3ecd9;
            width: min(92vw, 760px);
            height: min(86vh, 640px);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            overflow: visible; /* ← important pour que les onglets débordent */
        }

        /* Page intérieure (avec quadrillage) */
        .page {
            position: absolute;
            inset: 0;
            background: #f3ecd9;
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 4px;
            overflow: hidden;
            z-index: 0;
        }

        /* ── Reliure (inchangée, validée) ── */
        .binding {
            position: absolute;
            display: flex;
            align-items: center;
            pointer-events: none;
            z-index: 2;
        }

        .hole-ring {
            position: relative;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .hole {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border-radius: 50%;
            background: rgba(60, 50, 38, 0.5);
            z-index: 2;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .ring-front {
            position: absolute;
            left: 50%;
            top: 50%;
            border-radius: 50%;
            border: 3.5px solid #7a7466;
            border-top-color: #d8d4c4;
            border-left-color: #c2bca8;
            box-sizing: border-box;
            z-index: 1;
        }

        /* HORIZONTAL (desktop) */
        @media (min-width: 721px) {
            .binding {
                left: 10px;
                top: 8px;
                bottom: 8px;
                width: 20px;
                height: auto;
                flex-direction: column;
                justify-content: space-between;
            }
            .ring-front {
                width: 40px;
                height: 16px;
                margin: -8px 0 0 -40px;
                clip-path: polygon(50% 50%, 100% 55%, 100% 0%, 0% 0%, 0% 100%, 50% 100%, 50% 50%);
            }
        }

        /* VERTICAL (mobile) */
        @media (max-width: 720px) {
            .binding {
                top: 10px;
                left: 8px;
                right: 8px;
                bottom: auto;
                width: auto;
                height: 20px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .ring-front {
                width: 16px;
                height: 40px;
                margin: -40px 0 0 -8px;
                clip-path: polygon(50% 50%, 45% 100%, 100% 100%, 100% 0%, 0% 0%, 0% 50%, 50% 50%);
            }
        }

        /* ── Onglets ── */
        .tabs {
            position: absolute;
            right: -34px;          /* déborde à droite */
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 5;
            pointer-events: none;  /* pour le test, on désactive les clics */
        }

        .tab {
            writing-mode: vertical-rl;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.02em;
            color: #2b2417;
            background: #c9a86a;   /* couleur générique pour le test */
            border: none;
            width: 34px;
            flex: 1 1 0;
            padding: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.12);
            border-radius: 2px 0 0 2px;
        }

        /* On donne des couleurs différentes pour distinguer */
        .tab:nth-child(1) { background: #7d7466; flex: 0 0 44px; }
        .tab:nth-child(2) { background: #c9a86a; }
        .tab:nth-child(3) { background: #b97a4f; }
        .tab:nth-child(4) { background: #8c8a5e; }
        .tab:nth-child(5) { background: #a05c4e; }
        .tab:nth-child(6) { background: #6e7a5e; }

        /* Étiquette d’info */
        .badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 10;
            backdrop-filter: blur(4px);
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge small {
            font-weight: 400;
            opacity: 0.7;
            display: block;
            font-size: 0.6rem;
            margin-top: 2px;
        }

        /* Ajustement mobile : les onglets restent à droite, mais on réduit leur taille */
        @media (max-width: 720px) {
            .tabs {
                right: -30px;
            }
            .tab {
                width: 30px;
                font-size: 0.7rem;
                padding: 6px 0;
            }
        }
    </style>
</head>
<body>

<div class="mockup">
    <!-- Page intérieure -->
    <div class="page"></div>

    <!-- Reliure -->
    <div class="binding" id="binding"></div>

    <!-- Onglets -->
    <div class="tabs" id="tabs">
        <div class="tab">Couverture</div>
        <div class="tab">Géants</div>
        <div class="tab">Impromptu</div>
        <div class="tab">Visages</div>
        <div class="tab">Atelier</div>
        <div class="tab">Contact</div>
    </div>

    <!-- Badge d’information -->
    <div class="badge" id="badge">🔄 Redimensionnez pour basculer</div>
</div>

<script>
    // ─── Génération des anneaux (inchangée) ───────────────────
    const binding = document.getElementById('binding');
    const badge = document.getElementById('badge');
    const RING_SHORT_AXIS = 16;

    function buildBinding() {
        binding.innerHTML = '';
        const vertical = window.innerWidth <= 720;
        const space = vertical ? binding.clientWidth : binding.clientHeight;
        let count = Math.max(3, Math.floor(space / RING_SHORT_AXIS));
        if (!vertical) count = Math.max(3, count - 1);

        for (let i = 0; i < count; i++) {
            const item = document.createElement('div');
            item.className = 'hole-ring';

            const hole = document.createElement('div');
            hole.className = 'hole';

            const front = document.createElement('div');
            front.className = 'ring-front';

            item.appendChild(hole);
            item.appendChild(front);
            binding.appendChild(item);
        }

        // Mise à jour du badge
        if (vertical) {
            badge.innerHTML = '⬆️ VERTICAL · top:10px · left/right:8px';
        } else {
            badge.innerHTML = '⬅️ HORIZONTAL · left:10px · top/bottom:8px';
        }
    }

    buildBinding();

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            buildBinding();
        }, 150);
    });
</script>

</body>
</html>
